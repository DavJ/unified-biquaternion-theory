#
# wiki_update.yml
#
# Update the GitHub Wiki whenever DERIVATION_INDEX.md or canonical/ files change.
#
# What this workflow does:
#   1. Run tools/generate_wiki.py to regenerate status sections in wiki/ pages
#   2. Commit any changed wiki/ files back to the repo (so wiki/ stays in sync)
#   3. Push the wiki/ pages to the GitHub Wiki git repository
#
# Trigger conditions:
#   - Push to main when DERIVATION_INDEX.md or canonical/ files change
#   - Manual workflow_dispatch

name: Update Wiki

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.wiki/*"
  workflow_dispatch:
    inputs:
      force:
        description: "Force full wiki regeneration even if no files changed"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  update-wiki:
    name: Regenerate and push wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run generate_wiki.py
        run: python tools/generate_wiki.py

      - name: Commit updated wiki pages (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet wiki/; then
            echo "No wiki/ changes to commit."
          else
            git add wiki/
            git commit -m "chore: regenerate wiki from DERIVATION_INDEX.md [skip ci]"
            git push
          fi

      - name: Clone wiki repository
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            wiki_repo

      - name: Sync wiki pages to wiki repository
        run: |
          rsync -av --delete wiki/ wiki_repo/

          cd wiki_repo
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to push to wiki."
          else
            git commit -m "Auto-update wiki from repository canonical sources"
            # Use --force because wiki/ in the main repository is the
            # authoritative source. Direct edits to the GitHub Wiki or
            # concurrent CI runs can cause the remote to diverge; force-push
            # ensures the generated content always wins.
            git push --force \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
              HEAD:master
            echo "✓ Wiki updated successfully."
          fi

      - name: Summary
        if: always()
        run: |
          echo "================================================"
          echo "Wiki Update Complete"
          echo "================================================"
          echo ""
          echo "Pages synced from wiki/ to GitHub Wiki:"
          ls wiki/*.md | xargs -I{} basename {}
          echo ""
          echo "DERIVATION_INDEX.md sections parsed:"
          python -c "
          import sys; sys.path.insert(0, '.')
          from tools.generate_wiki import parse_derivation_index
          secs = parse_derivation_index('DERIVATION_INDEX.md')
          total = sum(len(v) for v in secs.values())
          print(f'  {len(secs)} sections, {total} entries')
          "
          echo "================================================"
