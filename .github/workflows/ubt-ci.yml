name: UBT Theory Invariants CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ubt-invariants:
    name: Test UBT Theory Invariants
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy
      
      - name: Check Python syntax (all files)
        run: |
          echo "Checking Python syntax for all .py files..."
          python -m compileall -q .
          if [ $? -ne 0 ]; then
            echo "❌ Python syntax errors found!"
            exit 1
          fi
          echo "✓ All Python files compile successfully"
      
      - name: Run repo sanity check (includes symbol consistency)
        run: |
          echo "Running verify_repo_sanity (covers consciousness terms, symbol collisions, SU3 overstatements, and repo-wide symbol consistency)..."
          python tools/verify_repo_sanity.py --verbose
          if [ $? -ne 0 ]; then
            echo "❌ Repo sanity check FAILED — see file:line above"
            exit 1
          fi
          echo "✓ verify_repo_sanity passed"

      - name: Run symbol consistency check
        run: |
          echo "Running verify_symbol_consistency (SC2/SC3/SC4)..."
          python tools/verify_symbol_consistency.py --verbose
          if [ $? -ne 0 ]; then
            echo "❌ Symbol consistency check FAILED — see file:line above"
            exit 1
          fi
          echo "✓ verify_symbol_consistency passed"

      - name: Run UBT theory invariant tests
        run: |
          pytest tests/test_ubt_tex_invariants.py tests/test_repo_sanity.py tests/test_symbol_consistency.py -v
        
      - name: Test summary
        if: always()
        run: |
          echo "================================================"
          echo "UBT Theory Invariant Tests Complete"
          echo "================================================"
          echo ""
          echo "These tests enforce that:"
          echo "  1. g_{μν} is never treated as fundamental"
          echo "  2. Biquaternionic objects (𝓖, Ω, 𝓡, 𝓣) remain primary"
          echo "  3. GR appears only as Re(...) projection"
          echo "  4. Required lock-in files exist"
          echo "  5. \\mathcal{G}_{μν} is not used as Einstein-tensor LHS"
          echo "  6. No SU(3)-overstatement claims"
          echo ""
          echo "Failures indicate theory regression or symbol collision."
          echo "================================================"

      - name: Generate theory status map
        run: |
          python tools/generate_theory_map.py
          echo "Theory map generated."

      - name: Commit updated theory map
        if: github.event_name == 'push'
        run: |
          git config user.name "UBT CI"
          git config user.email "ci@ubt"
          git add docs/THEORY_STATUS.md docs/THEORY_STATUS_SUMMARY.md
          if git diff --staged --quiet; then
            echo "No changes to theory map."
          else
            git commit -m "ci: auto-update theory status map [skip ci]"
            git push || echo "⚠️ git push failed (non-fatal: branch may be protected or read-only in PR context)"
          fi
