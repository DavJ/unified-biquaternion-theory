name: Build Canonical PDF
permissions:
  contents: write

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint complex time usage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      
      - name: Run complex time linter
        run: |
          python3 scripts/lint_complex_time_usage.py
        continue-on-error: true  # Don't fail build, just warn
      
      - name: Run symbolic alpha tests
        run: |
          python3 scripts/test_symbolic_alpha.py

  compile:
    name: Build canonical/UBT_canonical_main.tex
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect engine
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          root="canonical/UBT_canonical_main.tex"
          dir="$(dirname "$root")"
          pdf="${root%.tex}.pdf"

          engine="pdflatex"
          if grep -Eq '^[[:space:]]*%!?TEX.*(xelatex|lualatex)' "$root"; then
            engine="$(grep -Eo '^[[:space:]]*%!?TEX.*(xelatex|lualatex)' "$root" | grep -Eo '(xelatex|lualatex)' | head -n1)"
          fi
          grep -Eq '\\usepackage\{(fontspec|polyglossia|unicode-math)\}' "$root" && engine="xelatex"
          grep -Eq '\\usepackage\{(luacode|luaotfload)\}' "$root" && engine="lualatex"

          {
            echo "dir=$dir"
            echo "pdf=$pdf"
            echo "engine=$engine"
          } >> "$GITHUB_OUTPUT"

      - name: Build canonical PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: canonical/UBT_canonical_main.tex
          work_in_root_file_dir: true
          latexmk_use_xelatex: ${{ steps.detect.outputs.engine == 'xelatex' }}
          latexmk_use_lualatex: ${{ steps.detect.outputs.engine == 'lualatex' }}
          args: -interaction=nonstopmode -halt-on-error
          extra_system_packages: "py-pygments"
          pre_compile: "tlmgr install physics braket || true"

      - name: Check produced files
        id: produced
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          pdf="${{ steps.detect.outputs.pdf }}"
          dir="${{ steps.detect.outputs.dir }}"
          if [[ -f "$pdf" ]]; then
            echo "pdf_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "pdf_exists=false" >> "$GITHUB_OUTPUT"
          fi
          shopt -s nullglob
          logs=( "$dir"/*.log "$dir"/*.blg "$dir"/*.fls "$dir"/*.aux "$dir"/*.out )
          if (( ${#logs[@]} )); then
            echo "logs_exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "logs_exist=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for LaTeX errors in logs
        if: always() && steps.produced.outputs.logs_exist == 'true'
        shell: bash
        run: |
          set -euo pipefail
          dir="${{ steps.detect.outputs.dir }}"
          echo "Checking for undefined control sequences..."
          if grep -q "Undefined control sequence" "$dir"/*.log 2>/dev/null; then
            echo "❌ Found undefined control sequences in LaTeX log:"
            grep -n "Undefined control sequence" "$dir"/*.log || true
            echo "This usually means missing macro definitions or missing \\input statements."
            exit 1
          fi
          echo "✓ No undefined control sequences found"

      - name: Upload PDF
        if: steps.produced.outputs.pdf_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: canonical-pdf
          path: ${{ steps.detect.outputs.pdf }}

      - name: Upload logs (only if any)
        if: always() && steps.produced.outputs.logs_exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: canonical-logs
          path: |
            ${{ steps.detect.outputs.dir }}/*.log
            ${{ steps.detect.outputs.dir }}/*.blg
            ${{ steps.detect.outputs.dir }}/*.fls
            ${{ steps.detect.outputs.dir }}/*.aux
            ${{ steps.detect.outputs.dir }}/*.out

  publish_pdfs:
    needs: compile
    if: needs.compile.result == 'success' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download canonical PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: canonical-pdf
          path: build_pdfs

      - name: Copy PDF to docs/pdfs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/pdfs
          cp -f build_pdfs/UBT_canonical_main.pdf docs/pdfs/UBT_canonical_main.pdf

      - name: Commit & push PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pdfs/UBT_canonical_main.pdf
          git commit -m "chore: update canonical PDF [skip ci]" || echo "No changes to commit"
          git push

