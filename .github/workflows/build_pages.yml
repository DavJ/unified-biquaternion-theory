name: Build GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "canonical/**"
      - "wiki/**"
      - "docs/pdfs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc latexmk \
            texlive-latex-extra texlive-fonts-recommended \
            texlive-latex-recommended

      - name: Create output directories
        run: mkdir -p _site/canonical _site/wiki _site/assets

      - name: Compile main canonical document (pandoc from canonical/)
        working-directory: canonical
        run: |
          pandoc UBT_canonical_main.tex \
            --standalone \
            --mathjax="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" \
            --metadata title="Unified Biquaternion Theory — Canonical Theory" \
            --css /unified-biquaternion-theory/assets/style.css \
            -o ../_site/canonical/UBT_canonical_main.html 2>&1 | head -20
          [ -f "../_site/canonical/UBT_canonical_main.html" ] && \
            echo "✓ Main HTML generated ($(wc -l < ../_site/canonical/UBT_canonical_main.html) lines)" || \
            (echo "✗ Main HTML NOT generated" && exit 1)

      - name: Smoke test HTML output
        run: |
          HTML=_site/canonical/UBT_canonical_main.html
          [ -f "$HTML" ] || (echo "✗ HTML missing" && exit 1)
          LINES=$(wc -l < "$HTML")
          echo "✓ HTML present ($LINES lines)"
          grep -qE 'tex-mml-chtml|mathjax' "$HTML" && \
            echo "✓ MathJax CDN present" || echo "⚠ MathJax missing"
          grep -q '\\begin{equation}' "$HTML" && \
            echo "⚠ Raw LaTeX leaked" || echo "✓ No raw equations"
          HEADINGS=$(grep -c "<h[1-6]" "$HTML" || true)
          echo "✓ Heading elements found: $HEADINGS"

      - name: Compile standalone derivation files
        run: |
          for f in \
            canonical/geometry/Rpsi_dynamical_fix.tex \
            canonical/geometry/biquaternionic_vacuum_solutions.tex \
            canonical/interactions/B_base_derivation_complete.tex \
            canonical/bridges/QED_limit_bridge.tex \
            canonical/bridges/GR_chain_bridge.tex \
            canonical/bridges/fermionic_statistics_bridge.tex \
            canonical/bridges/Maxwell_limit_bridge.tex \
            canonical/bridges/QED_complete_chain.tex \
            canonical/gr_closure/GR_chain_summary.tex \
            canonical/gr_closure/step2_theta_only_closure.tex \
            canonical/gr_closure/step3_signature_theorem.tex \
            canonical/chirality/step1_psi_parity.tex \
            canonical/chirality/step2_chirality_result.tex \
            canonical/qm_emergence/step3_dirac_emergence.tex \
            canonical/qm_emergence/step7_born_rule.tex \
            canonical/su3_derivation/step3_SU3_result.tex \
            canonical/8pi_common_origin.tex; do
            [ -f "$f" ] || continue
            grep -q "\\\\documentclass" "$f" || continue
            name=$(basename "$f" .tex)
            subdir=$(dirname "$f" | sed 's|canonical/||')
            mkdir -p "_site/canonical/$subdir"
            pandoc "$f" \
              --standalone \
              --mathjax="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" \
              --metadata title="UBT — $name" \
              --css /unified-biquaternion-theory/assets/style.css \
              -o "_site/canonical/$subdir/${name}.html" 2>/dev/null && \
              echo "✓ $name.html" || echo "⚠ $name.html skipped"
          done

      - name: Convert wiki Markdown to HTML
        run: |
          for f in wiki/*.md; do
            name=$(basename "$f" .md)
            [ "$name" = "_Sidebar" ] && continue
            pandoc "$f" \
              --standalone \
              --mathjax="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" \
              --metadata title="UBT Wiki — $name" \
              --css /unified-biquaternion-theory/assets/style.css \
              -o "_site/wiki/${name}.html" 2>/dev/null || true
          done
          echo "✓ Wiki pages converted"

      - name: Create CSS stylesheet
        run: |
          cat > _site/assets/style.css << 'CSS'
          body { font-family: Georgia, "Times New Roman", serif;
            max-width: 960px; margin: 40px auto; padding: 0 24px;
            line-height: 1.7; color: #222; }
          h1, h2, h3, h4 { color: #1a1a2e; margin-top: 2em; }
          code, pre { font-family: "Courier New", monospace;
            background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }
          pre { padding: 12px; overflow-x: auto; }
          table { border-collapse: collapse; width: 100%; margin: 1em 0; }
          td, th { border: 1px solid #ccc; padding: 8px 12px; }
          th { background: #f0f0f0; }
          CSS

      - name: Copy PDF if available
        run: |
          [ -f docs/pdfs/UBT_canonical_main.pdf ] && \
            cp docs/pdfs/UBT_canonical_main.pdf _site/ || true

      - name: Create index.html
        run: |
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Unified Biquaternion Theory</title>
            <link rel="stylesheet" href="/unified-biquaternion-theory/assets/style.css">
            <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
          </head>
          <body>
          <h1>Unified Biquaternion Theory</h1>
          <p><strong>Author</strong>: Ing. David Jaroš &nbsp;|&nbsp;
             <strong>License</strong>: CC BY-NC-ND 4.0 &nbsp;|&nbsp;
             <a href="https://github.com/DavJ/unified-biquaternion-theory">GitHub repo</a></p>
          <p>
            <a href="/unified-biquaternion-theory/canonical/UBT_canonical_main.html">&#x1F310; View rendered (HTML+MathJax)</a> &nbsp;|&nbsp;
            <a href="/unified-biquaternion-theory/UBT_canonical_main.pdf">&#x1F4C4; Download PDF</a> &nbsp;|&nbsp;
            <a href="https://github.com/DavJ/unified-biquaternion-theory/blob/master/canonical/UBT_canonical_main.tex">&#x1F4DD; Raw .tex</a>
          </p>
          <h2>Individual Derivations</h2>
          <ul>
            <li><a href="/unified-biquaternion-theory/canonical/geometry/Rpsi_dynamical_fix.html">R_&#x03C8; dynamical fixation</a></li>
            <li><a href="/unified-biquaternion-theory/canonical/interactions/B_base_derivation_complete.html">B_base derivation</a></li>
            <li><a href="/unified-biquaternion-theory/canonical/bridges/QED_limit_bridge.html">QED limit bridge</a></li>
            <li><a href="/unified-biquaternion-theory/canonical/bridges/GR_chain_bridge.html">GR chain bridge</a></li>
            <li><a href="/unified-biquaternion-theory/canonical/bridges/fermionic_statistics_bridge.html">Fermionic statistics bridge</a></li>
          </ul>
          <h2>Wiki</h2>
          <ul>
            <li><a href="/unified-biquaternion-theory/wiki/Home.html">Home</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/Overview.html">Overview</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/Derivations.html">All Derivations</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/Alpha_Constant.html">Fine Structure Constant &#x03B1;</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/SU3_Structure.html">SU(3) Structure</a></li>
          </ul>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
