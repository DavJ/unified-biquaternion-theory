name: Build GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "canonical/**"
      - "wiki/**"
      - "docs/pdfs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live and make4ht
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-latex-extra texlive-fonts-recommended \
            texlive-science texlive-publishers \
            make4ht tex4ht pandoc latexmk \
            texlive-latex-recommended

      - name: Install missing LaTeX packages
        run: |
          sudo tlmgr update --self || true
          sudo tlmgr install tcolorbox environ trimspaces || true

      - name: Create output directories
        run: mkdir -p _site/canonical _site/wiki _site/assets

      - name: Compile main canonical document to HTML (make4ht)
        working-directory: canonical
        run: |
          # make4ht uses LaTeX itself — all macros/packages resolved correctly
          # mathjax option: renders math via MathJax in browser
          make4ht -d ../_site/canonical UBT_canonical_main.tex \
            "mathjax,html5" \
            "-cunihtf -utf8" \
            2>&1 | tail -30 || \
          make4ht -d ../_site/canonical UBT_canonical_main.tex \
            "mathjax" 2>&1 | tail -30 || \
          echo "make4ht failed — falling back to pandoc"

      - name: Fallback — pandoc for any .tex with \documentclass
        run: |
          # Only process standalone files (with \documentclass)
          for f in canonical/geometry/Rpsi_dynamical_fix.tex \
                    canonical/geometry/biquaternionic_vacuum_solutions.tex \
                    canonical/interactions/B_base_derivation_complete.tex \
                    canonical/bridges/QED_limit_bridge.tex \
                    canonical/bridges/GR_chain_bridge.tex; do
            [ -f "$f" ] || continue
            grep -q "\\\\documentclass" "$f" || continue
            name=$(basename "$f" .tex)
            subdir=$(dirname "$f" | sed 's|canonical/||')
            mkdir -p "_site/canonical/$subdir"
            pandoc "$f" \
              --standalone \
              --mathjax \
              --metadata title="UBT — $name" \
              --css /unified-biquaternion-theory/assets/style.css \
              -o "_site/canonical/$subdir/${name}.html" || true
          done

      - name: Convert wiki Markdown to HTML (pandoc)
        run: |
          for f in wiki/*.md; do
            name=$(basename "$f" .md)
            [ "$name" = "_Sidebar" ] && continue
            pandoc "$f" \
              --standalone \
              --mathjax \
              --metadata title="UBT Wiki — $name" \
              --css /unified-biquaternion-theory/assets/style.css \
              -o "_site/wiki/${name}.html" || true
          done

      - name: Create CSS stylesheet
        run: |
          cat > _site/assets/style.css << 'CSS'
          body {
            font-family: Georgia, "Times New Roman", serif;
            max-width: 960px; margin: 40px auto;
            padding: 0 24px; line-height: 1.7; color: #222;
          }
          h1, h2, h3, h4 { color: #1a1a2e; margin-top: 2em; }
          code, pre { font-family: "Courier New", monospace;
            background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }
          pre { padding: 12px; overflow-x: auto; }
          table { border-collapse: collapse; width: 100%; margin: 1em 0; }
          td, th { border: 1px solid #ccc; padding: 8px 12px; }
          th { background: #f0f0f0; }
          .source-links { font-size: 0.85em; color: #666; margin-bottom: 1.5em; }
          .source-links a { margin-right: 12px; }
          .tcolorbox { border: 1px solid #aaa; padding: 12px 16px;
            margin: 1em 0; border-radius: 4px; background: #fafafa; }
          CSS

      - name: Ensure MathJax CDN in HTML output
        run: |
          for f in _site/canonical/*.html _site/canonical/**/*.html; do
            [ -f "$f" ] || continue
            if ! grep -qi "mathjax" "$f"; then
              sed -i 's|</head>|<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>\n</head>|' "$f"
            fi
          done

      - name: Copy PDF if available
        run: |
          [ -f docs/pdfs/UBT_canonical_main.pdf ] && \
            cp docs/pdfs/UBT_canonical_main.pdf _site/ || true

      - name: Create index.html
        run: |
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Unified Biquaternion Theory</title>
            <link rel="stylesheet" href="/unified-biquaternion-theory/assets/style.css">
            <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
          </head>
          <body>
          <h1>Unified Biquaternion Theory</h1>
          <p><strong>Author</strong>: Ing. David Jaroš &nbsp;|&nbsp;
             <strong>License</strong>: CC BY-NC-ND 4.0 &nbsp;|&nbsp;
             <a href="https://github.com/DavJ/unified-biquaternion-theory">GitHub repo</a></p>

          <h2>Canonical Theory</h2>
          <ul>
            <li><a href="/unified-biquaternion-theory/canonical/UBT_canonical_main.html">Full document</a>
                &mdash; compiled from UBT_canonical_main.tex via make4ht + MathJax
                [<a href="https://github.com/DavJ/unified-biquaternion-theory/blob/master/canonical/UBT_canonical_main.tex">.tex</a>]</li>
          </ul>

          <h2>Individual Derivations</h2>
          <ul>
            <li><a href="/unified-biquaternion-theory/canonical/geometry/Rpsi_dynamical_fix.html">R_&#x03C8; dynamical fixation</a>
                [<a href="https://github.com/DavJ/unified-biquaternion-theory/blob/master/canonical/geometry/Rpsi_dynamical_fix.tex">.tex</a>]</li>
            <li><a href="/unified-biquaternion-theory/canonical/interactions/B_base_derivation_complete.html">B_base derivation</a>
                [<a href="https://github.com/DavJ/unified-biquaternion-theory/blob/master/canonical/interactions/B_base_derivation_complete.tex">.tex</a>]</li>
            <li><a href="/unified-biquaternion-theory/canonical/bridges/QED_limit_bridge.html">QED limit bridge</a>
                [<a href="https://github.com/DavJ/unified-biquaternion-theory/blob/master/canonical/bridges/QED_limit_bridge.tex">.tex</a>]</li>
            <li><a href="/unified-biquaternion-theory/canonical/bridges/GR_chain_bridge.html">GR chain bridge</a>
                [<a href="https://github.com/DavJ/unified-biquaternion-theory/blob/master/canonical/bridges/GR_chain_bridge.tex">.tex</a>]</li>
          </ul>

          <h2>Wiki</h2>
          <ul>
            <li><a href="/unified-biquaternion-theory/wiki/Home.html">Home</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/Overview.html">Overview</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/GR_Recovery.html">GR Recovery</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/Alpha_Constant.html">Fine Structure Constant &#x03B1;</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/SU3_Structure.html">SU(3) Structure</a></li>
            <li><a href="/unified-biquaternion-theory/wiki/Derivations.html">All Derivations</a></li>
          </ul>

          <h2>Downloads</h2>
          <ul>
            <li><a href="/unified-biquaternion-theory/UBT_canonical_main.pdf">&#x1F4C4; Canonical theory PDF</a>
                (auto-built from LaTeX)</li>
          </ul>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
