name: "Engineering Task"
description: "Implement code, tools, scripts, or refactors."
title: "[ENGINEERING] "
labels: ["role:engineer"]
body:
  - type: markdown
    attributes:
      value: |
        **Read** `docs/RESEARCH_OPERATING_SYSTEM.md` before submitting.
        If this task touches protected paths, the PR must carry the `allow-core-change` label.

  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "What needs to be built or changed?"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "Motivation / Scientist Reference"
      description: "Link to the Scientist issue or PR that motivates this task, or explain the need."
    validations:
      required: true

  - type: textarea
    id: repo_grounding
    attributes:
      label: "Repo Grounding"
      description: "At least 2 path:line citations showing the current state being changed."
      placeholder: |
        - tools/alpha_running.py:5 — function to be refactored
        - canonical/AXIOMS.md:20 — equation implemented
    validations:
      required: true

  - type: textarea
    id: implementation_plan
    attributes:
      label: "Implementation Plan"
      description: "High-level steps or diff outline."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I have read `docs/RESEARCH_OPERATING_SYSTEM.md`"
          required: true
        - label: "I have provided ≥2 path:line citations in Repo Grounding"
          required: true
        - label: "I have checked whether protected paths are affected (add `allow-core-change` if so)"
          required: true
