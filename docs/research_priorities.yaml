#
# research_priorities.yaml
#
# Machine-readable research priorities for the Unified Biquaternion Theory team.
# Mirrors and extends RESEARCH_PRIORITIES.md for automated tooling and role assignment.
#
# Schema:
#   meta          — document metadata and current phase
#   layers        — Layer A / B / C definitions (theory classification system)
#   roles         — ROS roles (see docs/RESEARCH_OPERATING_SYSTEM.md)
#   priorities    — ordered list of research priorities
#     Each priority has:
#       id, title, layer, status, timeline_start, timeline_end
#       goal, owner_role, tasks[], outcome, notes
#     Each task has:
#       id, title, layer, status, owner_role, description
#
# Statuses: active | pending | completed | deprioritized | speculative
# Layer values: A | B | C | speculative
# Owner roles: scientist | engineer | experimentalist | librarian | auditor

---
meta:
  version: "1.0"
  date: "2026-03-04"
  author: "Ing. David Jaroš"
  phase: "Mathematical formalization and testable predictions"
  focus: >
    Complete remaining derivations, prepare for peer review, execute CMB test.
  review_cadence: "quarterly"
  next_review: "2026-06-01"
  references:
    - path: "RESEARCH_PRIORITIES.md"
      description: "Human-readable source document (canonical reference for content)"
    - path: "docs/RESEARCH_OPERATING_SYSTEM.md"
      description: "ROS roles and workflow rules"
    - path: "core/AXIOMS.md"
      description: "Locked canonical axioms that all priorities must respect"

# ---------------------------------------------------------------------------
# LAYER DEFINITIONS
# ---------------------------------------------------------------------------
layers:
  A:
    name: "Core"
    emoji: "🟢"
    description: "Validated mathematical foundations. Locked unless a major version change is approved."
    promotion_from_B_requires:
      - "Full first-principles derivation (no gaps)"
      - "Mathematical proof complete"
      - "Independent verification"
      - "Peer review validation"

  B:
    name: "Observables"
    emoji: "🟡"
    description: "Semi-empirical predictions (α, Ω_b, m_e). Quantitative, but derivation gaps remain."
    promotion_from_C_requires:
      - "Quantitative predictions calculated"
      - "Multiple independent derivation approaches agree"
      - "No free parameters or clearly documented fitting"
      - "Observational data supports prediction"
    demotion_to_C_triggers:
      - "Derivation gap discovered"
      - "Prediction fails observational test"

  C:
    name: "Research Front"
    emoji: "🔵"
    description: "Testable hypotheses under active investigation."
    demotion_to_speculative_triggers:
      - "Hypothesis becomes untestable"
      - "Requires extreme unverified assumptions"
    archive_triggers:
      - "Superseded by better framework"
      - "Definitively falsified"

  speculative:
    name: "Speculative"
    emoji: "🟠"
    description: >
      Exploratory ideas with minimal mathematical support.
      MUST live under speculative_extensions/. NOT part of Layers A, B, or C.

# ---------------------------------------------------------------------------
# ROLE DEFINITIONS (summary — full spec in docs/RESEARCH_OPERATING_SYSTEM.md)
# ---------------------------------------------------------------------------
roles:
  librarian:
    label: "Librarian"
    scope: "Canonical source-of-truth keeper; produces path:line citations; never commits theory changes."
  scientist:
    label: "Scientist"
    scope: "Theoretical structures, conjectures, derivations. Every claim must cite repo evidence."
  engineer:
    label: "Engineer"
    scope: "Code, tools, scripts. Cannot modify protected paths without allow-core-change label."
  experimentalist:
    label: "Experimentalist"
    scope: "Reproducible computational experiments. Every PR must include execution instructions + artifacts."
  auditor:
    label: "Auditor"
    scope: "Quality gate. Blocks merge if Repo Grounding is missing or citations are unverifiable."

