# ---------------------------------------------------------------------------
# LAYER PROMOTION PATHWAY (summary)
# ---------------------------------------------------------------------------
# Full rules are in RESEARCH_PRIORITIES.md (§ Layer Promotion Pathway)
# Quick reference:
#
#   C → B: quantitative predictions, multiple independent derivations, no free params, obs. support
#   B → A: full first-principles derivation, proof complete, independent verification, peer review
#   B → C: derivation gap discovered or prediction fails
#   C → speculative: hypothesis becomes untestable or requires extreme assumptions
#   Any → archive: superseded or definitively falsified
